<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISMEX OFFICIAL</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #0e1117; height: 100%; }
        
        /* The mask hides the bottom 50px where the Streamlit logo lives */
        .mask-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 50px); 
            overflow: hidden;
        }

        /* The iframe is taller than the container to push the logo off-screen */
        iframe { 
            width: 100%; 
            height: calc(100% + 50px); 
            border: none; 
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff88;
            font-family: sans-serif;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="loading">Connecting to Secure Server...</div>
    <div class="mask-container">
        <iframe id="main-app" src="" allow="clipboard-read; clipboard-write"></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');

        // Your actual Streamlit URL
        let targetURL = "https://ismex-philippines-internationalstockmarketexchange.streamlit.app/?embed=true";
        // This ensures that if someone uses your referral link, it passes to the app
        if (ref) {
            targetURL += "&ref=" + encodeURIComponent(ref);
        }

        const frame = document.getElementById('main-app');
        frame.src = targetURL;
    </script>
</body>
</html>
