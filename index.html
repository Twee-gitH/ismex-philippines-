<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bagong Pilipinas Stock Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-screen { display: none; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideIn 0.4s ease-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-24">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center p-8 text-center">
        <div class="mb-8">
            <div class="w-20 h-20 bg-red-600 rounded-full mx-auto mb-4 flex items-center justify-center text-white text-3xl font-bold shadow-xl border-4 border-blue-700">BP</div>
            <h1 class="text-2xl font-black text-blue-900 leading-tight uppercase">WELCOME TO <br>BAGONG PILIPINAS<br>STOCK MARKET</h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">Authorized Investor Portal</p>
        </div>
        
        <form id="login-form" class="w-full max-w-sm space-y-4">
            <input type="text" id="username" placeholder="Username" required class="w-full p-4 bg-slate-100 rounded-2xl border-none focus:ring-2 focus:ring-blue-600 outline-none font-semibold">
            <input type="password" placeholder="Secure Password" required class="w-full p-4 bg-slate-100 rounded-2xl border-none focus:ring-2 focus:ring-blue-600 outline-none">
            <button type="submit" class="w-full bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">Enter Market</button>
        </form>
    </div>

    <div id="dashboard" class="hidden-screen animate-slide">
        <nav class="bg-white border-b px-6 py-4 sticky top-0 z-50 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center text-white text-[10px] font-bold">BP</div>
                <h1 class="text-sm font-black text-blue-900">BAGONG PILIPINAS</h1>
            </div>
            <span id="user-display" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">@investor</span>
        </nav>

        <main class="max-w-md mx-auto p-4 space-y-6">
            <section class="bg-gradient-to-r from-blue-800 to-blue-600 rounded-3xl p-6 text-white shadow-xl">
                <p class="text-blue-100 text-[10px] uppercase font-bold tracking-widest">Available for Withdrawal</p>
                <h2 class="text-4xl font-black mt-1">$4,250.00</h2>
                <div class="mt-4 flex items-center text-[10px] font-bold bg-white/10 w-fit px-2 py-1 rounded uppercase">
                    🟢 Market Online (Active)
                </div>
            </section>

            <section class="space-y-4">
                <h3 class="font-bold text-slate-800">Investment Tiers</h3>
                
                <div onclick="calculate(100, 0.10)" class="bg-white p-5 rounded-3xl border border-slate-200 flex justify-between items-center active:scale-95 transition-all cursor-pointer">
                    <div><p class="text-2xl font-black text-slate-800">$100</p><p class="text-[10px] font-bold text-red-600 uppercase">10% ROI / 24 Hours</p></div>
                    <span class="text-xs font-black text-blue-700">SELECT</span>
                </div>

                <div onclick="calculate(500, 0.20)" class="bg-white p-5 rounded-3xl border border-slate-200 flex justify-between items-center active:scale-95 transition-all cursor-pointer">
                    <div><p class="text-2xl font-black text-slate-800">$500</p><p class="text-[10px] font-bold text-red-600 uppercase">20% ROI / 24 Hours</p></div>
